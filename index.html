<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>warrastr — TikTok Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050508; --surface: #0f0f14; --border: #1a1a24;
      --tt-pink: #ff0050; --tt-cyan: #00f2ea;
      --text: #f0f0f0; --muted: #555570;
      --glow-pink: rgba(255,0,80,0.3); --glow-cyan: rgba(0,242,234,0.3);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,0,80,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,242,234,0.06) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 1; }
    header { position: relative; z-index: 10; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; }
    .logo .w { color: var(--tt-pink); } .logo .r { color: var(--tt-cyan); }
    .badge { display: flex; align-items: center; gap: 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--tt-pink); box-shadow: 0 0 6px var(--tt-pink); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    main { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 2rem; gap: 2.5rem; max-width: 680px; margin: 0 auto; width: 100%; }
    .hero { text-align: center; }
    .hero h1 { font-size: clamp(2.5rem, 7vw, 4rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.04em; }
    .hero h1 .line1 { display: block; color: var(--tt-pink); text-shadow: 0 0 30px var(--glow-pink), 2px 2px 0 rgba(0,242,234,0.4); }
    .hero h1 .line2 { display: block; color: var(--tt-cyan); text-shadow: 0 0 30px var(--glow-cyan), -2px -2px 0 rgba(255,0,80,0.3); }
    .hero p { margin-top: 0.75rem; color: var(--muted); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
    .input-section { width: 100%; display: flex; flex-direction: column; gap: 0.75rem; }
    .input-row { display: flex; gap: 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0.5rem; transition: border-color 0.3s, box-shadow 0.3s; }
    .input-row:focus-within { border-color: var(--tt-pink); box-shadow: 0 0 0 3px var(--glow-pink); }
    input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.8rem; padding: 0.6rem 0.75rem; }
    input::placeholder { color: var(--muted); }
    .paste-btn { background: var(--border); border: none; border-radius: 8px; padding: 0.5rem 0.9rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: background 0.2s, color 0.2s; text-transform: uppercase; white-space: nowrap; }
    .paste-btn:hover { background: #222230; color: var(--text); }
    .dl-btn { width: 100%; background: linear-gradient(135deg, var(--tt-pink), #cc0040); color: white; border: none; border-radius: 12px; padding: 0.9rem; font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
    .dl-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--tt-cyan), #00bfb8); opacity: 0; transition: opacity 0.3s; }
    .dl-btn:hover::before { opacity: 1; }
    .dl-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--glow-pink); }
    .dl-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .dl-btn span { position: relative; z-index: 1; }
    .status { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--tt-cyan); display: flex; align-items: center; gap: 0.5rem; min-height: 1rem; }
    .spin { width: 10px; height: 10px; border: 2px solid var(--tt-cyan); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: none; animation: fadeUp 0.4s ease forwards; }
    .result-card.show { display: block; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
    .video-thumb { width: 100%; max-height: 300px; object-fit: cover; display: block; background: #0a0a10; }
    .video-info { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
    .video-title { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-author { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--tt-pink); margin-bottom: 1rem; }
    .dl-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .dl-option { flex: 1; min-width: 120px; padding: 0.65rem 1rem; border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; text-align: center; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
    .dl-option.no-wm { background: linear-gradient(135deg, var(--tt-pink), #cc0040); color: white; }
    .dl-option.no-wm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow-pink); }
    .dl-option.audio { background: linear-gradient(135deg, var(--tt-cyan), #00a8a3); color: #000; }
    .dl-option.audio:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow-cyan); }
    .dl-option.wm { background: var(--border); color: var(--muted); border: 1px solid #222230; }
    .dl-option.wm:hover { color: var(--text); background: #1a1a28; }
    .error-box { background: rgba(255,0,80,0.08); border: 1px solid rgba(255,0,80,0.25); border-radius: 10px; padding: 0.75rem 1rem; font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--tt-pink); display: none; }
    .error-box.show { display: block; }
    .howto { width: 100%; display: flex; gap: 1rem; flex-wrap: wrap; }
    .step { flex: 1; min-width: 140px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
    .step-num { font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; color: var(--tt-pink); margin-bottom: 0.4rem; }
    .step p { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
    footer { position: relative; z-index: 10; text-align: center; padding: 1.5rem; border-top: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); }
    footer .pink { color: var(--tt-pink); } footer .cyan { color: var(--tt-cyan); }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span class="w">warr</span><span class="r">astr</span></div>
    <div class="badge"><div class="dot"></div>TikTok DL</div>
  </header>
  <main>
    <div class="hero">
      <h1><span class="line1">Download</span><span class="line2">TikTok.</span></h1>
      <p>// no watermark. free. fast.</p>
    </div>
    <div class="input-section">
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="paste tiktok link here..."/>
        <button class="paste-btn" onclick="pasteClipboard()">Paste</button>
      </div>
      <button class="dl-btn" id="dlBtn" onclick="fetchVideo()"><span>↓ Download</span></button>
      <div class="status" id="status"></div>
      <div class="error-box" id="errorBox"></div>
    </div>
    <div class="result-card" id="resultCard">
      <img class="video-thumb" id="thumb" src="" alt="thumbnail"/>
      <div class="video-info">
        <div class="video-title" id="videoTitle"></div>
        <div class="video-author" id="videoAuthor"></div>
        <div class="dl-options">
          <a class="dl-option no-wm" id="noWmBtn" href="#" target="_blank">▶ No Watermark</a>
          <a class="dl-option audio" id="audioBtn" href="#" target="_blank">♪ Audio Only</a>
          <a class="dl-option wm" id="wmBtn" href="#" target="_blank">↓ With WM</a>
        </div>
      </div>
    </div>
    <div class="howto">
      <div class="step"><div class="step-num">01</div><p>Copy TikTok video link</p></div>
      <div class="step"><div class="step-num">02</div><p>Paste it in the input above</p></div>
      <div class="step"><div class="step-num">03</div><p>Hit download & enjoy</p></div>
    </div>
  </main>
  <footer>&copy; 2024 <span class="pink">warrastr</span> — made with <span class="cyan">✦</span> & zero budget</footer>

  <script>
    const KEY = '7cb96a9844msh9f365431c171955p186b3bjsn7f8e72cb8b2b';
    const HOST = 'social-media-video-downloader.p.rapidapi.com';

    async function pasteClipboard() {
      try { document.getElementById('urlInput').value = await navigator.clipboard.readText(); }
      catch { document.getElementById('urlInput').focus(); }
    }

    function setStatus(msg) {
      const el = document.getElementById('status');
      el.innerHTML = msg ? `<div class="spin"></div>${msg}` : '';
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = '// ' + msg;
      el.classList.add('show');
    }

    function hideError() { document.getElementById('errorBox').classList.remove('show'); }

    async function fetchVideo() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      const btn = document.getElementById('dlBtn');
      btn.disabled = true;
      hideError();
      setStatus('fetching video info...');
      document.getElementById('resultCard').classList.remove('show');

      try {
        const res = await fetch(`https://${HOST}/smvd/get/all?url=${encodeURIComponent(url)}`, {
          headers: { 'x-rapidapi-host': HOST, 'x-rapidapi-key': KEY }
        });
        const data = await res.json();
        if (!data || !data.links) throw new Error('video not found or invalid link');

        const links = data.links;
        const noWm = links.find(l => l.quality === 'hd') || links.find(l => l.type === 'mp4') || links[0];
        const audio = links.find(l => l.type === 'mp3' || l.quality === 'audio');
        const wm = links.find(l => l.quality === 'watermark') || links[links.length - 1];

        document.getElementById('thumb').src = data.thumbnail || '';
        document.getElementById('videoTitle').textContent = data.title || 'TikTok Video';
        document.getElementById('videoAuthor').textContent = '@ ' + (data.author || 'unknown');
        document.getElementById('noWmBtn').href = noWm?.url || '#';
        document.getElementById('audioBtn').href = audio?.url || noWm?.url || '#';
        document.getElementById('wmBtn').href = wm?.url || '#';

        setStatus('');
        document.getElementById('resultCard').classList.add('show');
      } catch (err) {
        showError(err.message);
        setStatus('');
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchVideo();
    });
  </script>
</body>
</html>
